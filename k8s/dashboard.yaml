apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: disaster-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: disaster-dashboard:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND_PROXY_TARGET
              value: http://backend:8000
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: disaster-system
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
  type: NodePort
