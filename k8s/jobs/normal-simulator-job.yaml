apiVersion: batch/v1
kind: Job
metadata:
  name: upload-simulator-normal
  namespace: disaster-system
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: upload-simulator
        mode: normal
    spec:
      restartPolicy: Never
      containers:
        - name: upload-simulator
          image: disaster-simulator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND_URL
              value: http://backend:8000
            - name: MODE
              value: normal
            - name: RATE
              value: "1"
            - name: DURATION
              value: "30"
