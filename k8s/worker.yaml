apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-worker
  namespace: disaster-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-worker
  template:
    metadata:
      labels:
        app: analysis-worker
    spec:
      containers:
        - name: analysis-worker
          image: disaster-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
            - name: TASK_QUEUE
              value: image.task.queue
            - name: RESULT_QUEUE
              value: analysis.result.queue
            - name: STORAGE_ROOT
              value: /app
            - name: MOCK_PROCESSING_DELAY
              value: "0.3"
            - name: HF_HUB_DISABLE_XET
              value: "1"
            - name: HF_HOME
              value: /app/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: MODEL_NAME
              value: Luwayy/disaster_images_model
            - name: ANALYZER_MODE
              value: hf
          volumeMounts:
            - name: report-storage
              mountPath: /app/storage
      volumes:
        - name: report-storage
          hostPath:
            path: /tmp/disaster-storage
            type: DirectoryOrCreate
